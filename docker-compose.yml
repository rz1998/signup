version: '3.8'

services:
  signup-api:
    build: .
    ports:
      - "8082:8082"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./etc:/app/etc
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - signup-network

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: signup_user
      POSTGRES_PASSWORD: signup_password
      POSTGRES_DB: signup_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - signup-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signup_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

networks:
  signup-network:
    driver: bridge
